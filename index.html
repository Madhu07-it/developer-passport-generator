<!DOCTYPE html>
<html>
<head>
    <title>Profile Card Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>User Profile Card Generator</h1>

    <div class="form-box">
        <input type="text" id="name" placeholder="Enter Name">

        <textarea id="bio" placeholder="Enter Bio"></textarea>

        <input type="text" id="image" placeholder="Enter Image URL">

        <button onclick="generateProfile()">
            Generate Card
        </button>
    </div>

    <div id="profileCard"></div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
